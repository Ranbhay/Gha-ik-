<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #f1c40f; font-family: sans-serif; 
               display: flex; flex-direction: column; align-items: center; 
               justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .label { font-size: 5vw; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .ghati { font-size: 28vw; font-weight: 900; line-height: 1; color: #f1c40f; }
        .pal { font-size: 10vw; color: #e67e22; font-weight: bold; }
        .sub { font-size: 3.5vw; color: #444; margin-top: 15px; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="label">Ghaṭikā</div>
    <div id="g" class="ghati">00</div>
    <div id="p" class="pal">00 Pal</div>
    <div class="sub">VEDIC TIME • AGRA</div>

    <script>
        function updateVedicTime() {
            const now = new Date();
            
            // Fixed Sunrise for Agra on March 23 (approx 6:18 AM)
            // This ensures the widget works even if internet is restricted
            const sunrise = new Date();
            sunrise.setHours(6, 18, 0, 0); 

            let diffMs = now - sunrise;
            
            // If it's before sunrise, we are in the previous day's cycle
            if (diffMs < 0) diffMs += 86400000;

            const totalMinutes = diffMs / (1000 * 60);
            const totalGhatis = totalMinutes / 24; 
            
            const ghati = Math.floor(totalGhatis);
            const pal = Math.floor((totalGhatis - ghati) * 60);

            // Update the display
            document.getElementById('g').innerText = ghati.toString().padStart(2, '0');
            document.getElementById('p').innerText = pal.toString().padStart(2, '0') + " Pal";
        }

        // Run immediately so placeholders disappear
        updateVedicTime();
        
        // Update every 30 seconds to save battery
        setInterval(updateVedicTime, 30000);
    </script>
</body>
</html>
