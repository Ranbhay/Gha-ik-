<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vedic Nadi Clock</title>
    <style>
        body { background: #000; color: #f1c40f; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .nadi-display { font-size: 5rem; font-weight: bold; margin-bottom: 0; }
        .pal-display { font-size: 2rem; color: #e67e22; margin-top: -10px; }
        .info { color: #555; margin-top: 30px; font-size: 0.8rem; text-align: center; }
    </style>
</head>
<body>
    <div class="nadi-display" id="nadi">--</div>
    <div class="pal-display" id="pal">-- Pal</div>
    <div class="info" id="sun-info">Calculating Sunrise...</div>

    <script>
        async function getSunrise() {
            // This fetches sunrise for your current IP location automatically
            const res = await fetch('https://api.sunrisesunset.io/json?lat=27.1767&lng=78.0081'); // Example Agra. In real use, browser Geolocation is better.
            const data = await res.json();
            return data.results.sunrise;
        }

        async function init() {
            const sunriseStr = await getSunrise();
            const now = new Date();
            const sunrise = new Date(now.toDateString() + ' ' + sunriseStr);

            setInterval(() => {
                let diff = new Date() - sunrise;
                if (diff < 0) diff += 86400000; // Handle time before sunrise as previous day cycle
                
                let totalMinutes = diff / 1000 / 60;
                let totalNadis = totalMinutes / 24;
                
                let n = Math.floor(totalNadis);
                let p = Math.floor((totalNadis - n) * 60); // 1 Nadi = 60 Pal
                
                document.getElementById('nadi').innerText = n;
                document.getElementById('pal').innerText = p + " Pal";
                document.getElementById('sun-info').innerText = "Sunrise: " + sunriseStr;
            }, 1000);
        }
        init();
    </script>
</body>
</html>
